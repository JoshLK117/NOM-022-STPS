<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOM-022-STPS</title>
  <style>
    /* Estilos generales */
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #15abf1, #0a786d);
      color: #fff;
      overflow-x: hidden;
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-size: 4rem;
      animation: fadeInDown 2s ease forwards;
    }

    header p {
      font-size: 1.5rem;
      margin-top: 20px;
      animation: fadeInUp 2s ease forwards;
    }

    /* Botones */
    .btn-container {
      margin-top: 40px;
      display: flex;
      gap: 20px;
    }

    .btn {
        text-decoration: none;
        color: #fff;  
      padding: 15px 30px;
      border: none;
      border-radius: 30px;
      font-size: 1.2rem;
      cursor: pointer;
      background: linear-gradient(45deg, #dcf711, #f06b05);
      color: #fff;
      transition: transform 0.3s, box-shadow 0.3s;
      display: inline-block;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 10%, transparent 10%);
      animation: pulse 2s infinite;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255,255,255,0.6);
    }

    /* Animaciones */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { transform: scale(0); opacity: 0.7; }
      50% { transform: scale(1); opacity: 0; }
      100% { transform: scale(0); opacity: 0; }
    }

    /* Fondo animado */
    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      overflow: hidden;
      z-index: -1;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      animation: move 20s linear infinite;
    }

    .circle:nth-child(1) { width: 100px; height: 100px; top: 20%; left: 10%; animation-duration: 25s; }
    .circle:nth-child(2) { width: 150px; height: 150px; top: 60%; left: 70%; animation-duration: 30s; }
    .circle:nth-child(3) { width: 80px; height: 80px; top: 40%; left: 50%; animation-duration: 20s; }

    @keyframes move {
      from { transform: translateY(0) rotate(0deg); }
      to { transform: translateY(-1000px) rotate(360deg); }
    }
  </style>
</head>
<body>
  <header>
    <div class="background">
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
    </div>
    <h1>NOM-022-STPS-2015</h1>
    <p>Electricidad estática en los centros de trabajo-Condiciones de seguridad</p>
    <div class="btn-container">
      <a href="inicio.html" class="btn">Inicio</a>
      <a href="sabermas.html" class="btn">Saber más</a>
      <a href="equipo.html" class="btn">Equipo</a>
    </div>

  </header>
</body>
</html>
